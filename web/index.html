<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My LLM</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #0f1117; color: #e6e6e6; }
    header { padding: 16px 24px; background: #171a23; border-bottom: 1px solid #262b38; }
    header h1 { margin: 0; font-size: 18px; }
    header small { color: #8a93a6; }
    .tabs { display: flex; gap: 8px; padding: 12px 24px 0; }
    .tab { padding: 8px 16px; cursor: pointer; border-radius: 8px 8px 0 0; background: #1b1f2a; color: #8a93a6; }
    .tab.active { background: #232838; color: #fff; }
    main { padding: 24px; max-width: 820px; margin: 0 auto; }
    .panel { display: none; }
    .panel.active { display: block; }
    textarea, input { width: 100%; background: #1b1f2a; color: #fff; border: 1px solid #2c3242; border-radius: 8px; padding: 10px; font-size: 14px; }
    textarea { min-height: 90px; resize: vertical; }
    button { background: #4f7cff; color: #fff; border: 0; border-radius: 8px; padding: 10px 18px; font-size: 14px; cursor: pointer; margin-top: 10px; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .out { white-space: pre-wrap; background: #1b1f2a; border: 1px solid #2c3242; border-radius: 8px; padding: 14px; margin-top: 14px; min-height: 60px; }
    .log { font-family: ui-monospace, monospace; font-size: 12px; color: #9fd0a0; max-height: 320px; overflow: auto; }
    label { font-size: 13px; color: #8a93a6; display: block; margin: 12px 0 4px; }
    .note { font-size: 12px; color: #c9a14a; margin-top: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>🧠 My LLM</h1>
    <small id="status">checking model…</small>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="chat">💬 Chat</div>
    <div class="tab" data-tab="train">🎓 Train</div>
  </div>

  <main>
    <!-- CHAT -->
    <section class="panel active" id="chat">
      <label>System prompt (optional — sets the persona)</label>
      <input id="system" placeholder="You are a helpful assistant." />
      <label>Your message</label>
      <textarea id="prompt" placeholder="Ask something…"></textarea>
      <button id="send">Send</button>
      <div class="out" id="answer">…</div>
    </section>

    <!-- TRAIN -->
    <section class="panel" id="train">
      <p>Fine-tune the model on the examples in <code>data/train.jsonl</code>.
         Edit that file first, then start training.</p>
      <div class="note">⚠️ Training is heavy. Do this locally or on a free GPU
         (Colab/Kaggle). On Railway's CPU it will be very slow.</div>
      <button id="trainBtn">Start training</button>
      <div class="out log" id="trainLog">No training started yet.</div>
    </section>
  </main>

  <script>
    // --- tabs ---
    document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
      document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
      document.querySelectorAll(".panel").forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      document.getElementById(t.dataset.tab).classList.add("active");
    });

    // --- status banner ---
    fetch("/health").then(r => r.json()).then(h => {
      document.getElementById("status").textContent =
        `model: ${h.base_model} · fine-tuned: ${h.fine_tuned ? "yes" : "no"}`;
    });

    // --- chat ---
    const send = document.getElementById("send");
    send.onclick = async () => {
      const prompt = document.getElementById("prompt").value.trim();
      if (!prompt) return;
      const system = document.getElementById("system").value.trim() || null;
      const answer = document.getElementById("answer");
      send.disabled = true; answer.textContent = "thinking… (first reply is slow — it loads the model)";
      try {
        const r = await fetch("/generate", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, system })
        });
        const data = await r.json();
        answer.textContent = data.response ?? JSON.stringify(data);
      } catch (e) { answer.textContent = "Error: " + e; }
      send.disabled = false;
    };

    // --- training ---
    const trainBtn = document.getElementById("trainBtn");
    const trainLog = document.getElementById("trainLog");
    let poll = null;
    trainBtn.onclick = async () => {
      trainBtn.disabled = true;
      await fetch("/train", { method: "POST" });
      poll = setInterval(async () => {
        const s = await (await fetch("/train/status")).json();
        trainLog.textContent = (s.log || []).join("\n") || "starting…";
        trainLog.scrollTop = trainLog.scrollHeight;
        if (!s.running && (s.done || s.error)) {
          clearInterval(poll);
          trainBtn.disabled = false;
          trainLog.textContent += s.error ? `\n\n❌ ${s.error}` : "\n\n✅ Done! Switch to Chat to try it.";
        }
      }, 1500);
    };
  </script>
</body>
</html>
